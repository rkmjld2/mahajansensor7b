<!DOCTYPE html>
<html>
<head>
<title>Sensor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; }
table, th, td { border:1px solid black; border-collapse:collapse; padding:5px; }
button { margin:5px; }
input { margin:5px; }
</style>
</head>

<body>

<h2>Sensor Dashboard</h2>

Status: <span id="status">Checking...</span>

<br><br>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="syncSD()">Load Full SD Data</button>
<button onclick="resetView()">Reset View</button>
<button onclick="showFullData()">Show Full Data</button>
<button onclick="downloadCSV()">Download CSV</button>

<hr>

<h3>⚙️ Command Box</h3>

<input type="text" id="cmd" placeholder="CLEAR_SD or DELETE 100,200" style="width:300px;">
<button onclick="runCommand()">Run</button>

<p id="cmdResult"></p>

<hr>

<h3>🔍 Search</h3>

ID From: <input type="number" id="idFrom">
ID To: <input type="number" id="idTo">
<button onclick="searchByID()">Search ID</button>

<br><br>

Start Date: <input type="datetime-local" id="startDate">
End Date: <input type="datetime-local" id="endDate">
<button onclick="searchByDate()">Search Date</button>

<br>

<button onclick="showAll()">Show All</button>
<button onclick="showGraph()">Show Graph</button>

<hr>

<h3>📊 Graph</h3>
<canvas id="chart"></canvas>

<hr>

<table>
<thead>
<tr>
<th>ID</th><th>S1</th><th>S2</th><th>S3</th><th>Time</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>

let chart;
let fullData = [];
let filteredData = [];

// ✅ NEW CONTROL FLAG
let mode = "live"; // live | sd | search

// LOAD DATA (ONLY IN LIVE MODE)
async function loadData(){

    if(mode !== "live") return;

    let res = await fetch('/api/all');
    fullData = await res.json();
    filteredData = fullData;
    displayData(fullData);
}

// DISPLAY TABLE
function displayData(data){
    let html="";
    data.forEach(r=>{
        html += `<tr>
        <td>${r.id}</td>
        <td>${r.sensor1}</td>
        <td>${r.sensor2}</td>
        <td>${r.sensor3}</td>
        <td>${r.time}</td>
        </tr>`;
    });
    document.getElementById("data").innerHTML = html;
}

// GRAPH
function drawGraph(data){
    let labels = data.map(r => r.id);
    let s1 = data.map(r => r.sensor1);
    let s2 = data.map(r => r.sensor2);
    let s3 = data.map(r => r.sensor3);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {label:"S1", data:s1},
                {label:"S2", data:s2},
                {label:"S3", data:s3}
            ]
        }
    });
}

// SEARCH ID
function searchByID(){

    mode = "search";

    let from = parseInt(idFrom.value);
    let to = parseInt(idTo.value);

    filteredData = fullData.filter(r => r.id >= from && r.id <= to);
    displayData(filteredData);

    status.innerText = "Search (ID)";
}

// SEARCH DATE
    function searchByDate(){

    mode = "search";

    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;

    if(!start || !end){
        alert("Select start and end date with time");
        return;
    }

    // Convert input to match SD format
    let startTime = start.replace("T"," ") + ":00";
    let endTime   = end.replace("T"," ") + ":59";

    filteredData = fullData.filter(r=>{
        return r.time >= startTime && r.time <= endTime;
    });

    displayData(filteredData);

    status.innerText = "Search (Date + Time)";
}
// SHOW ALL
function showAll(){
    mode = "search";
    filteredData = fullData;
    displayData(fullData);
    status.innerText = "Showing All (Frozen)";
}

// GRAPH BUTTON
function showGraph(){
    drawGraph(filteredData);
}

// COMMAND
async function runCommand(){

    mode = "search"; // freeze

    let cmd = document.getElementById("cmd").value;

    if(!cmd){
        alert("Enter command");
        return;
    }

    let res = await fetch('/sendcmd?cmd=' + cmd);
    let text = await res.text();

    document.getElementById("cmdResult").innerText = text;

    status.innerText = "Command Executed (Frozen)";
}

// SYNC SD
async function syncSD(){

    mode = "sd";

    status.innerText = "Sync in progress...";

    await fetch('/sendcmd?cmd=SYNC');

    setTimeout(async ()=>{
        await showFullData();
        status.innerText = "Full SD Data Loaded";
    },15000);
}

// RESET (MAIN FIX)
async function resetView(){

    mode = "live";

    await fetch('/api/reset');

    fullData = [];
    filteredData = [];

    await loadData();

    status.innerText = "Live View";
}

// FULL VIEW
async function showFullData(){

    mode = "sd";

    await fetch('/api/fullview');
    let res = await fetch('/api/all');

    fullData = await res.json();
    filteredData = fullData;

    displayData(fullData);

    status.innerText = "Full Data View";
}

// BASIC
function start(){ fetch('/start'); }
function stop(){ fetch('/stop'); }
function downloadCSV(){ window.location.href="/download"; }

// STATUS
async function checkStatus(){
    try{
        let res = await fetch('/status');
        let data = await res.json();

        document.getElementById("status").innerText =
            data.status + " | Mode: " + mode;

    }catch{
        document.getElementById("status").innerText = "Checking";
    }
}

// AUTO REFRESH ONLY FOR LIVE
setInterval(loadData,5000);
setInterval(checkStatus,5000);

loadData();
checkStatus();

</script>

</body>
</html>
